version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
      exclude:
        - govuk_*
    groups:
      test:
        patterns:
          - rspec*
          - capybara
          - database_cleaner*
          - factory_bot*
          - faker
          - govuk_test
          - rails-controller-testing
          - shoulda-matchers
          - simplecov*
          - timecop
          - webmock

      lint:
        patterns:
          - rubocop*
          - erb_lint

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 3
    groups:
      lint:
        patterns:
          - standardx
          - stylelint*
          - postcss

  # Ruby needs to be upgraded manually in multiple places, so cannot
  # be upgraded by Dependabot. That effectively makes the below
  # config redundant, as ruby is the only updatable thing in the
  # Dockerfile, although this may change in the future. We hope this
  # config will save a dev from trying to upgrade ruby via Dependabot.
  - package-ecosystem: docker
    ignore:
      - dependency-name: ruby
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
